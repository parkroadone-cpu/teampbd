async function callAI(messages,max_tokens){
  const res=await fetch("https://ucpunqweumtotlutprwp.supabase.co/functions/v1/extract",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+SUPA_KEY
    },
    body:JSON.stringify({messages,max_tokens:max_tokens||1000})
  });
  const data=await res.json();
  if(data.error)throw new Error(typeof data.error==="string"?data.error:JSON.stringify(data.error));
  return data.content?.find(b=>b.type==="text")?.text||"{}";
}

async function extractFromNotes(noteText,memberName){
  const prompt="You are a management assistant. Extract from these 1:1 notes:\n1. TASKS - concrete actions\n2. GOALS - broader objectives\n\nNotes for "+memberName+":\n\"\"\"\n"+noteText+"\n\"\"\"\n\nRespond ONLY with valid JSON:\n{\"tasks\":[{\"title\":\"action max 10 words\",\"due\":\"YYYY-MM-DD or null\",\"notes\":\"context\"}],\"goals\":[{\"title\":\"goal max 10 words\",\"due\":\"YYYY-MM-DD or null\",\"notes\":\"context\"}]}\nEmpty array if nothing found.";
  const text=await callAI([{role:"user",content:prompt}]);
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

async function extractProjectUpdate(updateText,project,activeInspectors){
  const inspectorList=activeInspectors.map(i=>i.name).join(", ")||"none";
  const defaultInspector=activeInspectors.length>0?activeInspectors[0].name:"unassigned";
  const prompt=`You are a construction project manager assistant. Extract ONLY explicitly mentioned or clearly inferable fields from this update. Do NOT guess.

Current project: ${project.name}
State: ${JSON.stringify({totalUnits:project.totalUnits,snagged:project.snagged,desnagged:project.desnagged,stage:project.stage,startDate:project.startDate,finishDate:project.finishDate})}
Active inspectors on this project: ${inspectorList}
Default inspector (assign tasks here unless another name is mentioned): ${defaultInspector}

Update text:
"""
${updateText}
"""

TASK ASSIGNMENT RULES:
- If a task mentions a specific inspector name, assign to that person
- Otherwise assign ALL tasks to the default inspector: ${defaultInspector}
- Always populate assignTo — never leave it null if inspectors exist

Respond ONLY with valid JSON (omit fields not mentioned):
{
  "totalUnits": number or omit,
  "snagged": number or omit,
  "desnagged": number or omit,
  "stage": "one of: Pre-Construction|Sub-structure|Superstructure|Trades 1st Fix|Trades 2nd Fix|Finishing|Snagging|De-snagging|Handover|Complete" or omit,
  "startDate": "YYYY-MM-DD" or omit,
  "finishDate": "YYYY-MM-DD" or omit,
  "notes": "updated summary" or omit,
  "newTasks": [{"title":"task max 10 words","due":"YYYY-MM-DD or null","assignTo":"inspector name from list above"}] or omit,
  "delayRisk": "brief delay risk note" or omit
}`;
  const text=await callAI([{role:"user",content:prompt}],1500);
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

function WeekView({member,onSetNext1to1}){
  const e=React.createElement;
  const today=new Date();today.setHours(0,0,0,0);
  const dow=today.getDay();const monday=new Date(today);monday.setDate(today.getDate()-(dow===0?6:dow-1));
  const days=Array.from({length:7},(_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return d;});
  const dayNames=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  function fmtD(d){return d.toISOString().slice(0,10);}
  function inRange(ds,start,end){const d=new Date(ds);const s=new Date(start);const en=new Date(end||start);s.setHours(0,0,0,0);en.setHours(23,59,59,999);return d>=s&&d<=en;}
  function getEvents(day){
    const ds=fmtD(day);const events=[];
    (member.absences||[]).forEach(a=>{if(inRange(ds,a.start,a.end)){const icon=a.type==="Holiday"?"🏖️":a.type==="Sick"?"🤒":"📋";events.push({label:icon+" "+a.type,color:"#1d4ed8",bg:"#dbeafe",border:"#bfdbfe"});}});
    member.tasks.filter(t=>!t.done&&t.due&&fmtD(new Date(t.due))===ds).forEach(t=>{events.push({label:"✓ "+t.title,color:"#6366f1",bg:"#eef2ff",border:"#c7d2fe"});});
    member.tasks.filter(t=>!t.done&&t.reminder&&fmtD(new Date(t.reminder))===ds).forEach(t=>{events.push({label:"⏰ "+t.title,color:"#7c3aed",bg:"#f5f3ff",border:"#ddd6fe"});});
    member.goals.filter(g=>g.status!=="Completed"&&g.due&&fmtD(new Date(g.due))===ds).forEach(g=>{events.push({label:"🎯 "+g.title,color:"#059669",bg:"#ecfdf5",border:"#a7f3d0"});});
    if(member.next1to1&&fmtD(new Date(member.next1to1))===ds)events.push({label:"💬 1:1 Meeting",color:"#b45309",bg:"#fef3c7",border:"#fde68a"});
    return events;
  }
  const ms=new Set(days.map(d=>d.toLocaleDateString("en-GB",{month:"long",year:"numeric"})));
  return e("div",{style:{background:"#fff",border:"1px solid #e5e0d8",borderRadius:14,padding:20,marginBottom:20}},
    e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}},
      e("div",null,e("div",{style:{fontSize:14,fontWeight:700,color:"#1a1a2e"}},"This Week"),e("div",{style:{fontSize:12,color:"#9ca3af",marginTop:2}},[...ms].join(" / "))),
      e("div",{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}},e("div",{style:{fontSize:12,color:"#6b7280"}},"Next 1:1:"),e("input",{type:"date",value:member.next1to1||"",onChange:ev=>onSetNext1to1(ev.target.value),style:{padding:"5px 8px",borderRadius:6,border:"1px solid #e5e0d8",background:"#fafaf8",color:"#1a1a2e",fontSize:12,outline:"none"}}))
    ),
    e("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}},
      ...days.map((day,i)=>{
        const isToday=fmtD(day)===fmtD(today);const isWeekend=i>=5;const events=getEvents(day);
        return e("div",{key:i,style:{borderRadius:10,padding:"8px 6px",background:isToday?"#f0eeff":isWeekend?"#faf9f7":"#fafaf8",border:"1px solid",borderColor:isToday?"#a78bfa":"#ede8e0",minHeight:90}},
          e("div",{style:{textAlign:"center",marginBottom:6}},
            e("div",{style:{fontSize:10,fontWeight:700,color:isWeekend?"#d1d5db":"#9ca3af",textTransform:"uppercase",letterSpacing:1}},dayNames[i]),
            e("div",{style:{fontSize:isToday?18:15,fontWeight:isToday?700:400,color:isToday?"#6366f1":isWeekend?"#d1d5db":"#374151"}},day.getDate()),

function ProjectsPage({projects,setProjects,members,setMembers,saving}){
  const e=React.createElement;
  const[view,setView]=useState("list"); // list | detail | new
  const[activeId,setActiveId]=useState(null);
  const[form,setForm]=useState({name:"",totalUnits:"",stage:"Snagging",startDate:"",finishDate:"",notes:""});
  const[updateText,setUpdateText]=useState("");
  const[aiUpdating,setAiUpdating]=useState(false);
  const[aiError,setAiError]=useState("");
  const[aiPreview,setAiPreview]=useState(null);
  const[newTaskTitle,setNewTaskTitle]=useState("");
  const[showInspForm,setShowInspForm]=useState(false);
  const[showUnitsEdit,setShowUnitsEdit]=useState(false);
  const[unitsForm,setUnitsForm]=useState({totalUnits:"",snagged:"",desnagged:"",handedOver:""});
  const[showBlockForm,setShowBlockForm]=useState(false);
  const[blockForm,setBlockForm]=useState({name:"",totalUnits:"",snagged:"",desnagged:"",handedOver:""});
  const[editingBlockId,setEditingBlockId]=useState(null);
  const[editBlockForm,setEditBlockForm]=useState({});
  const[inspForm,setInspForm]=useState({memberId:"",role:"",areas:"",notes:"",dateAssigned:new Date().toISOString().slice(0,10)});

  const active=projects.find(p=>p.id===activeId);

  function newProject(){
    const p={id:"p_"+Date.now(),name:form.name.trim()||"New Project",totalUnits:parseInt(form.totalUnits)||0,snagged:0,desnagged:0,stage:form.stage,startDate:form.startDate,finishDate:form.finishDate,notes:form.notes,inspectors:[],tasks:[],updates:[],delayRisk:""};
    setProjects(prev=>[...prev,p]);
    setForm({name:"",totalUnits:"",stage:"Snagging",startDate:"",finishDate:"",notes:""});
    setView("detail");setActiveId(p.id);
  }

  function updProj(id,fn){setProjects(prev=>prev.map(p=>p.id===id?fn(p):p));}
  function delProj(id){setProjects(prev=>prev.filter(p=>p.id!==id));setView("list");setActiveId(null);}

  function saveUpdateOnly(){
    if(!updateText.trim()||!active)return;
    updProj(active.id,p=>({...p,updates:[{id:"u_"+Date.now(),date:new Date().toISOString().slice(0,10),text:updateText},...(p.updates||[])]}));
    setUpdateText("");
  }

  function saveUpdateAsTask(){
    if(!updateText.trim()||!active)return;
    updProj(active.id,p=>({...p,tasks:[{id:"pt_"+Date.now(),title:updateText.trim().slice(0,80),due:"",done:false,projectId:active.id},...(p.tasks||[])]}));
    setUpdateText("");
  }

  async function runAiUpdate(){
    if(!updateText.trim()||!active)return;
    setAiUpdating(true);setAiError("");setAiPreview(null);
    try{
      const activeInspectors=(active.inspectors||[]).filter(i=>i.active);
      const result=await extractProjectUpdate(updateText,active,activeInspectors);
      setAiPreview(result);
    }catch(ex){setAiError("AI update failed: "+ex.message);}
    setAiUpdating(false);
  }

  function applyAiUpdate(){
    if(!aiPreview||!active)return;
    // Apply project-level updates
    updProj(active.id,p=>{
      const updated={...p};
      if(aiPreview.totalUnits!=null)updated.totalUnits=aiPreview.totalUnits;
      if(aiPreview.snagged!=null)updated.snagged=aiPreview.snagged;
      if(aiPreview.desnagged!=null)updated.desnagged=aiPreview.desnagged;
      if(aiPreview.stage)updated.stage=aiPreview.stage;
      if(aiPreview.startDate)updated.startDate=aiPreview.startDate;
      if(aiPreview.finishDate)updated.finishDate=aiPreview.finishDate;
      if(aiPreview.notes)updated.notes=aiPreview.notes;
      if(aiPreview.delayRisk)updated.delayRisk=aiPreview.delayRisk;
      if(aiPreview.newTasks&&aiPreview.newTasks.length>0){
        // ALL tasks go to project task list
        updated.tasks=[...(p.tasks||[]),...aiPreview.newTasks.map(t=>({id:"pt_"+Date.now()+Math.random(),title:t.title,due:t.due||"",done:false,projectId:active.id,assignTo:t.assignTo||""}))];
      }
      updated.updates=[{id:"u_"+Date.now(),date:new Date().toISOString().slice(0,10),text:updateText},...(p.updates||[])];
      return updated;
    });
    // Assign tasks to inspectors' personal task lists
    if(aiPreview.newTasks){
      const activeInspectors=(active.inspectors||[]).filter(i=>i.active);
      const defaultInspector=activeInspectors.length>0?activeInspectors[0]:null;

// ── LOGIN PAGE ───────────────────────────────────────────────────────────────
function LoginPage(){
  const e=React.createElement;
  const[email,setEmail]=useState("");
  const[sent,setSent]=useState(false);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");

  async function sendMagicLink(){
    if(!email.trim())return;
    setLoading(true);setError("");
    const{error:err}=await supabase.auth.signInWithOtp({
      email:email.trim(),
      options:{
        emailRedirectTo:window.location.origin,
        shouldCreateUser:true,
        data:{session_duration:432000}
      }
    });
    if(err){setError(err.message);setLoading(false);}
    else{setSent(true);setLoading(false);}
  }

  return e("div",{style:{minHeight:"100vh",background:"#f7f5f0",display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
    e("div",{style:{background:"#fff",borderRadius:20,padding:"48px 40px",maxWidth:420,width:"100%",border:"1px solid #e5e0d8",boxShadow:"0 4px 24px rgba(0,0,0,0.06)"}},
      e("div",{style:{textAlign:"center",marginBottom:36}},
        e("img",{src:"favicon.png",style:{width:56,height:56,borderRadius:12,marginBottom:16},onError:ev=>ev.target.style.display="none"}),
        e("div",{style:{fontSize:11,letterSpacing:3,textTransform:"uppercase",color:"#9ca3af",marginBottom:6}},"Manager's"),
        e("div",{style:{fontSize:28,fontWeight:"bold",color:"#1a1a2e",marginBottom:8}},"Team Tracker"),
        e("div",{style:{fontSize:14,color:"#9ca3af"}},"Sign in to access your workspace")
      ),
      sent?e("div",{style:{textAlign:"center"}},
        e("div",{style:{fontSize:48,marginBottom:16}},"📬"),
        e("div",{style:{fontSize:18,fontWeight:700,color:"#1a1a2e",marginBottom:8}},"Check your email"),
        e("div",{style:{fontSize:14,color:"#6b7280",lineHeight:1.6,marginBottom:24}},"We sent a magic link to ",e("strong",null,email),". Click it to sign in — the link is valid for 24 hours and your session will last 5 days."),
        e("button",{onClick:()=>setSent(false),style:{background:"none",border:"none",color:"#6366f1",fontSize:13,cursor:"pointer",textDecoration:"underline"}},"Use a different email")
      ):e("div",null,
        e("div",{style:{marginBottom:16}},
          e("div",{style:{fontSize:12,color:"#6b7280",marginBottom:6,fontWeight:600}},"Your email address"),
          e("input",{
            type:"email",
            value:email,
            onChange:ev=>setEmail(ev.target.value),
            onKeyDown:ev=>ev.key==="Enter"&&sendMagicLink(),
            placeholder:"you@company.com",
            autoFocus:true,
            style:{width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid #e5e0d8",background:"#fafaf8",color:"#1a1a2e",fontSize:15,outline:"none",boxSizing:"border-box"}
          })
        ),
        e("button",{
          onClick:sendMagicLink,
          disabled:loading||!email.trim(),
          style:{width:"100%",padding:"13px",borderRadius:10,border:"none",background:loading||!email.trim()?"#c7d2fe":"#6366f1",color:"#fff",fontSize:15,fontWeight:700,cursor:loading||!email.trim()?"not-allowed":"pointer",transition:"background 0.15s"}
        },loading?"Sending…":"Send Magic Link ✦"),
        error&&e("div",{style:{marginTop:12,fontSize:13,color:"#b91c1c",background:"#fee2e2",padding:"8px 12px",borderRadius:8}},error),
        e("div",{style:{marginTop:20,fontSize:12,color:"#9ca3af",textAlign:"center",lineHeight:1.6}},"No password needed. We'll email you a secure link that signs you in for 5 days.")
      )
    )
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const[session,setSession]=useState(undefined);
  const userEmail=session?.user?.email||"";
  const isManager=userEmail===MANAGER_EMAIL; // undefined=loading, null=no session, object=logged in
  const[members,setMembers]=useState([]);
  const[projects,setProjects]=useState([]);
  const[loading,setLoading]=useState(true);
  const[saving,setSaving]=useState(false);
  const[cloudError,setCloudError]=useState("");
  const[page,setPage]=useState("team"); // team | projects
  const[selected,setSelected]=useState(null);
  const[tab,setTab]=useState("Overview");
  const[sidebarOpen,setSidebarOpen]=useState(false);
  const[showAdd,setShowAdd]=useState(false);
  const[newName,setNewName]=useState("");
  const[newRole,setNewRole]=useState("");
  const[noteText,setNoteText]=useState("");
  const[noteDate,setNoteDate]=useState(new Date().toISOString().slice(0,10));
  const[extracting,setExtracting]=useState(false);
  const[extracted,setExtracted]=useState(null);
  const[extractError,setExtractError]=useState("");
  const[goalTitle,setGoalTitle]=useState("");
  const[goalDue,setGoalDue]=useState("");
  const[goalNotes,setGoalNotes]=useState("");
  const[taskTitle,setTaskTitle]=useState("");
  const[taskDue,setTaskDue]=useState("");
  const[taskReminder,setTaskReminder]=useState("");
  const[taskProject,setTaskProject]=useState("");
  const[editingInfo,setEditingInfo]=useState(false);
  const[infoForm,setInfoForm]=useState(defaultInfo);
  const[showAbsence,setShowAbsence]=useState(false);
  const[absType,setAbsType]=useState("Holiday");
  const[absStart,setAbsStart]=useState("");
  const[absEnd,setAbsEnd]=useState("");
  const[absNotes,setAbsNotes]=useState("");
  const saveTimer=useRef(null);
  const projSaveTimer=useRef(null);

  useEffect(()=>{
    // onAuthStateChange fires immediately with current session
    // AND catches the magic link token from URL hash automatically
    const{data:{subscription}}=supabase.auth.onAuthStateChange((event,session)=>{
      console.log("Auth event:",event,"session:",session?.user?.email);
      setSession(session??null);
      if(session&&window.location.hash.includes("access_token")){
        window.history.replaceState(null,"",window.location.pathname);
      }
    });
    // Also check existing session
    supabase.auth.getSession().then(({data:{session}})=>{
      console.log("Existing session:",session?.user?.email);
      if(session)setSession(session);
      else if(!window.location.hash.includes("access_token"))setSession(null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  // Auto-select linked member for team member logins
  useEffect(()=>{
    if(!isManager&&linkedMember&&selected!==linkedMember.id){
      setSelected(linkedMember.id);
      setTab("Overview");
    }
  },[linkedMember?.id,isManager]);

  useEffect(()=>{
    if(!session)return; // don't load data until logged in
    setLoading(true);
    keepAlive();
    Promise.all([loadFromCloud(),loadProjects()]).then(([members,projs])=>{
      if(members)setMembers(members);
      if(projs)setProjects(projs);
      setLoading(false);
    }).catch(err=>{
      setCloudError("Cloud error: "+err.message);
      try{const l=JSON.parse(localStorage.getItem("tm_v4")||"[]");setMembers(l);}catch{}
      try{const p=JSON.parse(localStorage.getItem("tm_projects")||"[]");setProjects(p);}catch{}
      setLoading(false);
    });
  },[session]);

  useEffect(()=>{
    if(loading)return;
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      setSaving(true);
      saveToCloud(members).then(()=>{setSaving(false);setCloudError("");localStorage.setItem("tm_v4",JSON.stringify(members));})
      .catch(err=>{setSaving(false);setCloudError("Save failed: "+err.message);});
    },1000);
  },[members]);

  useEffect(()=>{
    if(loading)return;
    if(projSaveTimer.current)clearTimeout(projSaveTimer.current);
    projSaveTimer.current=setTimeout(()=>{
      saveProjects(projects).then(()=>{localStorage.setItem("tm_projects",JSON.stringify(projects));})
      .catch(()=>{});
    },1000);
  },[projects]);

  // For team member login — find their profile by email
  const linkedMember=!isManager?members.find(m=>m.info?.email?.toLowerCase()===userEmail.toLowerCase()):null;
  // If team member, auto-select their profile
  const sm=members.find(m=>m.id===selected);
  function upd(id,fn){setMembers(p=>p.map(m=>m.id===id?fn(m):m));}
  function selectMember(id){setSelected(id);setTab("Overview");setSidebarOpen(false);setPage("team");}

  function addMember(){
    if(!newName.trim())return;
    const m={id:"m_"+Date.now(),name:newName.trim(),role:newRole.trim(),notes:[],goals:[],tasks:[],info:{...defaultInfo},absences:[]};
    setMembers(p=>[...p,m]);setNewName("");setNewRole("");setShowAdd(false);setSelected(m.id);setTab("Overview");setSidebarOpen(false);
  }

  function saveNoteOnly(){
    if(!noteText.trim())return;
    upd(selected,m=>({...m,notes:[{id:"n_"+Date.now(),date:noteDate,text:noteText},...m.notes]}));
    setNoteText("");setNoteDate(new Date().toISOString().slice(0,10));
  }

  function saveNoteAsTask(){
    if(!noteText.trim())return;
    upd(selected,m=>({...m,tasks:[{id:"t_"+Date.now(),title:noteText.trim().slice(0,80),due:"",reminder:"",done:false,notes:""},...m.tasks]}));
    setNoteText("");
  }

  async function saveNote(){
    if(!noteText.trim())return;
    const ct=noteText,cd=noteDate;
    upd(selected,m=>({...m,notes:[{id:"n_"+Date.now(),date:cd,text:ct},...m.notes]}));
    setNoteText("");setNoteDate(new Date().toISOString().slice(0,10));
    setExtracting(true);setExtracted(null);setExtractError("");
    try{
      const result=await extractFromNotes(ct,sm.name);
      const tagged={tasks:(result.tasks||[]).map((t,i)=>({...t,_id:i,_checked:true})),goals:(result.goals||[]).map((g,i)=>({...g,_id:i,_checked:true}))};
      if(tagged.tasks.length>0||tagged.goals.length>0)setExtracted(tagged);
      else setExtractError("No tasks or goals detected in these notes.");
    }catch(ex){setExtractError("AI extraction failed: "+ex.message);}
    setExtracting(false);
  }

  function confirmExtracted(){
    if(!extracted)return;
    upd(selected,m=>({...m,
      tasks:[...extracted.tasks.filter(t=>t._checked).map(t=>({id:"t_"+Date.now()+Math.random(),title:t.title,due:t.due||"",reminder:"",done:false,notes:t.notes||""})),...m.tasks],
      goals:[...extracted.goals.filter(g=>g._checked).map(g=>({id:"g_"+Date.now()+Math.random(),title:g.title,due:g.due||"",notes:g.notes||"",status:"On Track"})),...m.goals],
    }));
    setExtracted(null);

      e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}},
        e("div",{style:{fontSize:14,fontWeight:700,color:"#1a1a2e"}},"Add 1:1 Notes"),
        e("div",{style:{fontSize:11,color:"#6366f1",background:"#eef2ff",padding:"4px 12px",borderRadius:20,fontWeight:600}},"✦ AI extracts tasks & goals")
      ),
      e("input",{type:"date",value:noteDate,onChange:ev=>setNoteDate(ev.target.value),style:{...iLight,marginBottom:10}}),
      e("textarea",{value:noteText,onChange:ev=>setNoteText(ev.target.value),placeholder:"Paste meeting minutes or summary here…",rows:7,style:{...iLight,width:"100%",resize:"vertical"}}),
      e("div",{style:{display:"flex",gap:8,marginTop:12,flexWrap:"wrap",alignItems:"center"}},
        e("button",{onClick:saveNote,disabled:extracting||!noteText.trim(),style:{...bPurple,opacity:extracting||!noteText.trim()?0.5:1}},extracting?"⏳ Analysing…":"✦ Save & Extract Tasks / Goals"),
        e("button",{onClick:saveNoteOnly,disabled:!noteText.trim(),style:{...bDark,opacity:!noteText.trim()?0.5:1}},"💾 Save Note"),
        e("button",{onClick:saveNoteAsTask,disabled:!noteText.trim(),style:{...bAmber,opacity:!noteText.trim()?0.5:1}},"✓ Save as Task"),
        extracting&&e("div",{style:{fontSize:12,color:"#6366f1"}},"AI reading…")
      ),
      extractError&&e("div",{style:{marginTop:10,fontSize:12,color:"#b91c1c",background:"#fee2e2",padding:"8px 12px",borderRadius:8}},extractError)
    ),
    extracted&&(extracted.tasks.length>0||extracted.goals.length>0)&&e("div",{className:"extract-box"},
      e("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:16}},e("div",{style:{fontSize:24}},"✦"),e("div",null,e("div",{style:{fontSize:14,fontWeight:700,color:"#1a1a2e"}},"AI found items in your notes"),e("div",{style:{fontSize:12,color:"#6b7280"}},"Uncheck anything you don't want, then confirm."))),
      extracted.tasks.length>0&&e("div",{style:{marginBottom:16}},
        e("div",{style:{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:2,color:"#6366f1",marginBottom:8}},"Tasks ("+extracted.tasks.filter(t=>t._checked).length+" selected)"),
        ...extracted.tasks.map(t=>e("label",{key:t._id,style:{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",borderRadius:8,marginBottom:6,cursor:"pointer",background:t._checked?"#eef2ff":"#f9fafb",border:"1px solid",borderColor:t._checked?"#c7d2fe":"#e5e7eb"}},
          e("input",{type:"checkbox",checked:t._checked,onChange:()=>toggleExt("tasks",t._id),style:{marginTop:3,flexShrink:0}}),
          e("div",null,e("div",{style:{fontSize:14,color:"#1a1a2e",fontWeight:600}},t.title),t.due&&t.due!=="null"&&e("div",{style:{fontSize:11,color:"#6b7280",marginTop:2}},"Due: "+t.due),t.notes&&e("div",{style:{fontSize:12,color:"#6b7280",marginTop:2,fontStyle:"italic"}},t.notes))
        ))
      ),
      extracted.goals.length>0&&e("div",{style:{marginBottom:16}},
        e("div",{style:{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:2,color:"#059669",marginBottom:8}},"Goals ("+extracted.goals.filter(g=>g._checked).length+" selected)"),
        ...extracted.goals.map(g=>e("label",{key:g._id,style:{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",borderRadius:8,marginBottom:6,cursor:"pointer",background:g._checked?"#ecfdf5":"#f9fafb",border:"1px solid",borderColor:g._checked?"#a7f3d0":"#e5e7eb"}},
          e("input",{type:"checkbox",checked:g._checked,onChange:()=>toggleExt("goals",g._id),style:{marginTop:3,flexShrink:0}}),
          e("div",null,e("div",{style:{fontSize:14,color:"#1a1a2e",fontWeight:600}},g.title),g.due&&g.due!=="null"&&e("div",{style:{fontSize:11,color:"#6b7280",marginTop:2}},"Target: "+g.due),g.notes&&e("div",{style:{fontSize:12,color:"#6b7280",marginTop:2,fontStyle:"italic"}},g.notes))
        ))
      ),
      e("div",{style:{display:"flex",gap:10,flexWrap:"wrap"}},
        e("button",{onClick:confirmExtracted,style:{background:"#6366f1",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",fontSize:14,fontWeight:700,cursor:"pointer"}},"✓ Add Selected Items"),
        e("button",{onClick:()=>setExtracted(null),style:{background:"none",color:"#9ca3af",border:"1px solid #e5e7eb",borderRadius:8,padding:"10px 14px",fontSize:13,cursor:"pointer"}},"Dismiss")
      )
    ),
    ...Object.entries(grouped).map(([month,notes])=>e("div",{key:month,style:{marginBottom:24}},
      e("div",{style:{fontSize:12,fontWeight:700,color:"#6366f1",textTransform:"uppercase",letterSpacing:2,marginBottom:10}},month),
      ...notes.map(n=>e("div",{key:n.id,className:"card",style:{position:"relative"}},
        e("div",{style:{fontSize:11,color:"#9ca3af",marginBottom:6}},new Date(n.date).toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})),
        e("div",{style:{fontSize:14,color:"#374151",whiteSpace:"pre-wrap",lineHeight:1.7,paddingRight:28}},n.text),
        e("button",{onClick:()=>delNote(n.id),style:dBtn},"×")
      ))
    )),
    sm.notes.length===0&&e(Empty,null,"No 1:1 notes yet.")
  );

  // ── GOALS & TASKS ──
  const tabGoals=e("div",null,
    e("div",{style:{background:"#fff",border:"1px solid #e5e0d8",borderRadius:12,padding:20,marginBottom:24}},
      e("div",{style:{fontSize:14,fontWeight:700,color:"#1a1a2e",marginBottom:12}},"Add Goal Manually"),
      e("input",{value:goalTitle,onChange:ev=>setGoalTitle(ev.target.value),placeholder:"Goal title",style:{...iLight,width:"100%",marginBottom:8}}),
      e("input",{type:"date",value:goalDue,onChange:ev=>setGoalDue(ev.target.value),style:{...iLight,width:"100%",marginBottom:8}}),
      e("textarea",{value:goalNotes,onChange:ev=>setGoalNotes(ev.target.value),placeholder:"Notes, success criteria…",rows:3,style:{...iLight,width:"100%",resize:"vertical"}}),
      e("button",{onClick:addGoal,style:{...bDark,marginTop:10}},"Add Goal")
    ),
    e(SectionTitle,null,"Goals"),
    ...sm.goals.map(g=>e("div",{key:g.id,className:"card",style:{position:"relative"}},
      e("div",{style:{display:"flex",alignItems:"flex-start",gap:10,marginBottom:6,paddingRight:28}},e("div",{style:{flex:1,fontSize:15,fontWeight:600,color:"#1a1a2e"}},g.title),e(Badge,{status:g.status})),
      e("button",{onClick:()=>delGoal(g.id),style:dBtn},"×"),
      g.due&&e("div",{style:{fontSize:11,color:"#9ca3af",marginBottom:6}},"Target: "+new Date(g.due).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})),
      g.notes&&e("div",{style:{fontSize:13,color:"#6b7280",marginBottom:10,lineHeight:1.5}},g.notes),
      e("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
        ...["On Track","At Risk","Behind","Completed"].map(s=>e("button",{key:s,onClick:()=>setGoalStatus(g.id,s),style:{fontSize:11,padding:"5px 10px",borderRadius:20,cursor:"pointer",border:"1px solid",background:g.status===s?"#6366f1":"#f7f5f0",color:g.status===s?"#fff":"#6b7280",borderColor:g.status===s?"#6366f1":"#e5e0d8"}},s))
      )
    )),
    sm.goals.length===0&&e(Empty,null,"No goals yet."),
    e("div",{style:{background:"#fff",border:"1px solid #e5e0d8",borderRadius:12,padding:20,margin:"24px 0 16px"}},
      e("div",{style:{fontSize:14,fontWeight:700,color:"#1a1a2e",marginBottom:12}},"Add Task Manually"),
      e("input",{value:taskTitle,onChange:ev=>setTaskTitle(ev.target.value),placeholder:"Task description",style:{...iLight,width:"100%",marginBottom:8}}),
      e("div",{className:"task-dates"},
        e("div",{style:{flex:1}},e("div",{style:{fontSize:11,color:"#9ca3af",marginBottom:4}},"Due date"),e("input",{type:"date",value:taskDue,onChange:ev=>setTaskDue(ev.target.value),style:{...iLight,width:"100%"}})),
        e("div",{style:{flex:1}},e("div",{style:{fontSize:11,color:"#9ca3af",marginBottom:4}},"Remind me on"),e("input",{type:"date",value:taskReminder,onChange:ev=>setTaskReminder(ev.target.value),style:{...iLight,width:"100%"}}))
      ),
      projects.length>0&&e("div",{style:{marginTop:8}},
        e("div",{style:{fontSize:11,color:"#9ca3af",marginBottom:4}},"Link to Project (optional)"),
        e("select",{value:taskProject,onChange:ev=>setTaskProject(ev.target.value),style:{...iLight,width:"100%"}},
          e("option",{value:""},"— No project —"),
          ...projects.map(p=>e("option",{key:p.id,value:p.id},p.name))
        )
      ),
      e("button",{onClick:addTask,style:{...bDark,marginTop:10}},"Add Task")
    ),
    e(SectionTitle,null,"Tasks"),
    ...sm.tasks.map(t=>e("div",{key:t.id,className:"card",style:{display:"flex",alignItems:"center",gap:12,position:"relative"}},
      e("input",{type:"checkbox",checked:t.done,onChange:()=>toggleTask(sm.id,t.id),style:{width:18,height:18,cursor:"pointer",flexShrink:0}}),
      e("div",{style:{flex:1,paddingRight:28}},
        e("div",{style:{fontSize:14,color:t.done?"#9ca3af":"#374151",textDecoration:t.done?"line-through":"none"}},t.title),
        e("div",{style:{display:"flex",gap:10,marginTop:3,flexWrap:"wrap"}},
          t.due&&e("span",{style:{fontSize:11,color:"#9ca3af"}},"Due: "+new Date(t.due).toLocaleDateString("en-GB",{day:"numeric",month:"short"})),
          t.reminder&&e("span",{style:{fontSize:11,color:"#7c3aed"}},"⏰ "+new Date(t.reminder).toLocaleDateString("en-GB",{day:"numeric",month:"short"})),
          t.notes&&e("span",{style:{fontSize:11,color:"#9ca3af",fontStyle:"italic"}},t.notes)
        )
      ),
      e("button",{onClick:()=>delTask(t.id),style:dBtn},"×")
    )),
    sm.tasks.length===0&&e(Empty,null,"No tasks yet.")
  );

  const tabContent={Overview:tabOverview,"Personal Info":tabPersonal,"1:1 Notes":tabNotes,"Goals & Tasks":tabGoals};

  return e("div",null,sidebarEl,
    e("div",{className:"main-content"},
      e("div",{className:"mobile-topbar"},
        e("button",{onClick:()=>setSidebarOpen(true),style:{background:"none",border:"none",color:"#e8e4dc",fontSize:22,cursor:"pointer"}},"☰"),
        e("div",{style:{fontSize:15,fontWeight:"bold",color:"#e8e4dc"}},sm.name),
        e("div",{style:{width:32}})
      ),
      e("div",{className:"page-header"},
        e(Avatar,{name:sm.name}),
        e("div",{style:{flex:1,minWidth:0}},
          e("div",{style:{fontSize:20,fontWeight:"bold",color:"#1a1a2e",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},sm.name),
          e("div",{style:{fontSize:12,color:"#9ca3af"}},(sm.role||"Team Member")+" · "+sm.notes.length+" 1:1s · "+sm.goals.length+" goals · "+sm.tasks.filter(t=>!t.done).length+" open tasks")
        ),
        e("button",{onClick:()=>delMember(sm.id),style:{fontSize:12,color:"#ef4444",background:"none",border:"1px solid #fecaca",borderRadius:6,padding:"6px 10px",cursor:"pointer",whiteSpace:"nowrap"}},"Remove")
      ),
      e("div",{className:"tab-bar"},
        ...TABS.map(t=>e("button",{key:t,onClick:()=>setTab(t),style:{padding:"12px 16px",fontSize:13,fontWeight:600,border:"none",background:"none",cursor:"pointer",whiteSpace:"nowrap",borderBottom:tab===t?"2px solid #6366f1":"2px solid transparent",color:tab===t?"#6366f1":"#6b7280"}},t))
      ),
      e("div",{className:"tab-content"},tabContent[tab]||null)
    )
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
